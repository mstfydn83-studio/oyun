<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uzaydan Kaçış - Seviye 100</title>
    <style>
        :root {
            --primary-bg: #050510;
            --text-color: #ffffff;
            --accent-color: #00d4ff;
            --high-score-color: #ffd700;
            --success-color: #00ff88;
            --danger-color: #ff4444;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: var(--primary-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-color);
            touch-action: none;
        }

        #gameCanvas { display: block; background: radial-gradient(circle at center, #1a1a3a 0%, #050510 100%); }

        .overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.9);
            z-index: 10; text-align: center;
            backdrop-filter: blur(10px);
            padding: 20px; box-sizing: border-box;
            transition: opacity 1s ease-out;
        }

        /* MM Studios Splash Screen */
        #splashScreen {
            background: black;
            z-index: 100;
            opacity: 1;
        }

        .mm-logo {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -5px;
            color: white;
            line-height: 1;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        .studios-text {
            font-size: 1.2rem;
            letter-spacing: 12px;
            color: #888;
            text-transform: lowercase;
            margin-top: -10px;
            margin-left: 10px;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: var(--accent-color); text-shadow: 0 0 20px rgba(0, 212, 255, 0.6); }

        .stats-panel { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-box { background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.2); }

        .btn {
            padding: 12px 30px; font-size: 1.1rem;
            background: var(--accent-color); color: #000;
            border: none; border-radius: 30px;
            cursor: pointer; font-weight: bold;
            transition: 0.3s; margin: 5px; min-width: 150px;
        }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .btn-secondary { background: #555; color: white; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-challenge { background: var(--high-score-color); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .rocket-list { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; 
            margin: 20px 0; 
            width: 100%;
            max-width: 800px;
            max-height: 60vh;
            overflow-y: auto;
            padding: 10px;
        }
        .rocket-card {
            background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 15px; cursor: pointer;
            transition: 0.3s; position: relative;
        }
        .rocket-card.selected { border-color: var(--accent-color); background: rgba(0,212,255,0.1); }
        .rocket-card.locked .emoji { filter: grayscale(1) brightness(0.7); }
        .rocket-card .emoji { font-size: 2.5rem; display: block; margin-bottom: 5px; transition: 0.3s; }
        
        .action-btn {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 0.8rem;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            width: 100%;
            display: none; 
        }
        .rocket-card.active .action-btn { display: block; }
        
        .buy-btn { background: var(--high-score-color); color: black; font-weight: bold; }
        .select-btn { background: var(--success-color); color: black; font-weight: bold; }

        .score-board {
            position: fixed; top: 20px; left: 20px;
            z-index: 5; background: rgba(0,0,0,0.6);
            padding: 15px; border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); min-width: 150px;
        }

        #pauseBtn {
            position: fixed; top: 20px; right: 20px;
            z-index: 15; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 15px;
            border-radius: 10px; cursor: pointer;
            display: none; font-weight: bold;
        }

        .difficulty-bar-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .difficulty-bar { height: 100%; background: var(--success-color); width: 0%; transition: width 0.5s ease; }

        .settings-row {
            display: flex; align-items: center; justify-content: space-between;
            width: 250px; margin: 10px 0; background: rgba(255,255,255,0.05);
            padding: 10px 20px; border-radius: 15px;
        }

        #levelUpScreen, #gameOverScreen, #rocketMenu, #pauseMenu, #settingsMenu { display: none; }
        .controls { position: fixed; bottom: 40px; width: 100%; display: flex; justify-content: center; gap: 60px; pointer-events: none; }
        .control-btn { width: 70px; height: 70px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="splashScreen" class="overlay">
        <div class="mm-logo">MM</div>
        <div class="studios-text">studios</div>
    </div>

    <div class="score-board">
        <div id="ui-mode-text">Seviye: <span id="ui-level">1</span> / 100</div>
        <div>Skor: <span id="ui-score">0</span> / <span id="ui-target">100</span></div>
        <div style="color: var(--high-score-color);">Point: <span id="ui-points">0</span></div>
        <div class="difficulty-bar-container"><div id="ui-difficulty-bar" class="difficulty-bar"></div></div>
    </div>

    <button id="pauseBtn" onclick="togglePause()">DURDUR (P)</button>

    <div id="startScreen" class="overlay" style="display:none;">
        <h1>UZAYDAN KAÇIŞ</h1>
        <div class="stats-panel">
            <div class="stat-box">💰 Point: <span id="menu-total-points">0</span></div>
            <div class="stat-box">⭐ Mevcut Seviye: <span id="menu-current-level">1</span></div>
        </div>
        <button id="dailyBtn" class="btn btn-challenge" onclick="startDailyChallenge()">GÜNLÜK CHALLENGE</button>
        <div id="dailyTimer" style="font-size: 0.9rem; margin-top: 5px; opacity: 0.7;">Yükleniyor...</div>
        <div style="margin-top: 20px;">
            <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
            <button class="btn btn-secondary" onclick="showRocketMenu()">MARKET</button>
            <button class="btn btn-secondary" onclick="showSettings()">AYARLAR</button>
        </div>
    </div>

    <div id="rocketMenu" class="overlay">
        <h2>UZAY GEMİSİ MARKETİ</h2>
        <div class="rocket-list" id="rocket-list-container"></div>
        <button class="btn btn-secondary" onclick="hideRocketMenu()">GERİ</button>
    </div>

    <div id="settingsMenu" class="overlay">
        <h2>AYARLAR</h2>
        <div class="settings-row">
            <span>Müzik Sesleri</span>
            <input type="checkbox" id="musicToggle" onchange="updateSettings()" checked>
        </div>
        <div class="settings-row">
            <span>Efektler</span>
            <input type="checkbox" id="soundToggle" onchange="updateSettings()" checked>
        </div>
        <button class="btn btn-secondary" onclick="closeSettings()">GERİ</button>
    </div>

    <div id="pauseMenu" class="overlay">
        <h1>DURAKLATILDI</h1>
        <button class="btn" onclick="togglePause()">DEVAM ET</button>
        <button class="btn btn-secondary" onclick="showSettings()">AYARLAR</button>
        <button class="btn btn-danger" onclick="backToMenu()">ANA MENÜ</button>
    </div>

    <div id="levelUpScreen" class="overlay">
        <h1 style="color: var(--success-color);">GÖREV BAŞARILI!</h1>
        <p>Seviye <span id="completed-level">1</span> Tamamlandı</p>
        <p style="color: var(--high-score-color);">+<span id="earned-points">0</span> Point</p>
        <button id="nextLevelBtn" class="btn" onclick="nextLevel()">SONRAKİ SEVİYE (SPACE)</button>
        <button id="finishBtn" class="btn btn-challenge" onclick="backToMenu()" style="display:none;">OYUNU BİTİR</button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 id="game-over-title" style="color: var(--danger-color);">GÖREV BAŞARISIZ</h1>
        <p id="final-score-text"></p>
        <div style="display: flex; flex-direction: column;">
            <button id="retryBtn" class="btn" onclick="startGame()">TEKRAR DENE (SPACE)</button>
            <button class="btn btn-secondary" onclick="backToMenu()">ANA MENÜ</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="control-btn" id="leftBtn">◀</div>
        <div class="control-btn" id="rightBtn">▶</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let musicTimeout = null;

        function playNote(freq, dur, type = 'triangle', gainValue = 0.1) {
            if (!state.soundsEnabled || !audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(gainValue, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        function playLossSound() {
            if (!state.soundsEnabled) return;
            playNote(150, 0.5, 'sawtooth');
            playNote(100, 0.8, 'sine');
        }

        function startMusic() {
            if (!state.musicEnabled || musicTimeout || !audioCtx) return;
            
            const normalMelody = [
                { f: 261, d: 200, t: 'square' }, { f: 329, d: 200, t: 'square' }, 
                { f: 392, d: 200, t: 'square' }, { f: 523, d: 400, t: 'square' },
                { f: 392, d: 200, t: 'square' }, { f: 329, d: 200, t: 'square' },
                { f: 261, d: 200, t: 'square' }, { f: 196, d: 400, t: 'square' }
            ];

            const challengeMelody = [
                { f: 130, d: 150, t: 'square' }, { f: 130, d: 150, t: 'square' }, 
                { f: 261, d: 150, t: 'square' }, { f: 130, d: 150, t: 'square' },
                { f: 196, d: 150, t: 'square' }, { f: 130, d: 150, t: 'square' },
                { f: 220, d: 150, t: 'square' }, { f: 164, d: 150, t: 'square' }
            ];

            const currentMelody = state.isDaily ? challengeMelody : normalMelody;
            let index = 0;

            const playNext = () => {
                if (!game.active || game.paused || !state.musicEnabled) return;
                
                const note = currentMelody[index % currentMelody.length];
                if (note.f > 0) {
                    playNote(note.f, note.d / 1000, note.t || 'triangle', state.isDaily ? 0.05 : 0.06);
                }
                
                musicTimeout = setTimeout(() => {
                    index++;
                    playNext();
                }, note.d + 10);
            };
            
            playNext();
        }

        function stopMusic() { 
            clearTimeout(musicTimeout); 
            musicTimeout = null; 
        }

        let state = {
            level: parseInt(localStorage.getItem('spaceLevel')) || 1,
            totalPoints: parseInt(localStorage.getItem('spacePoints')) || 0,
            selectedRocketIdx: parseInt(localStorage.getItem('spaceRocketIdx')) || 0,
            unlockedRockets: JSON.parse(localStorage.getItem('spaceUnlockedRockets')) || [0],
            lastDaily: parseInt(localStorage.getItem('spaceLastDaily')) || 0,
            dailyUsed: localStorage.getItem('spaceDailyUsed') === new Date().toDateString(),
            isDaily: false,
            musicEnabled: localStorage.getItem('music') !== 'false',
            soundsEnabled: localStorage.getItem('sounds') !== 'false'
        };

        const rockets = [
            { name: "Acemi", emoji: "🚀", speed: 8, multiplier: 1, cost: 0, power: "Düşük" },
            { name: "Hızcı", emoji: "🛸", speed: 12, multiplier: 1.5, cost: 750, power: "Orta" },
            { name: "Zırhlı", emoji: "🚁", speed: 6, multiplier: 2.2, cost: 1500, power: "Yüksek" },
            { name: "Alevli", emoji: "🔥", speed: 10, multiplier: 2.8, cost: 3000, power: "Yüksek" },
            { name: "Galaktik", emoji: "🌠", speed: 14, multiplier: 3.5, cost: 6000, power: "Ultra" },
            { name: "Efsane", emoji: "🛰️", speed: 16, multiplier: 5, cost: 12000, power: "Efsanevi" },
            { name: "Kara Delik", emoji: "🌑", speed: 5, multiplier: 10, cost: 25000, power: "Tanrısal" },
            { name: "X-Fighter", emoji: "✈️", speed: 20, multiplier: 8, cost: 50000, power: "Kozmik" }
        ];

        let game = { active: false, paused: false, score: 0, target: 100, obstacles: [], stars: [], player: null, keys: {}, animationId: null };

        function init() {
            updateUI(); resize(); createStars();
            updateDailyTimer(); setInterval(updateDailyTimer, 1000);
            
            const mt = document.getElementById('musicToggle');
            const st = document.getElementById('soundToggle');
            if (mt) mt.checked = state.musicEnabled;
            if (st) st.checked = state.soundsEnabled;
            
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                if (splash) {
                    splash.style.opacity = '0';
                    setTimeout(() => { 
                        splash.style.display = 'none'; 
                        const start = document.getElementById('startScreen');
                        if (start) start.style.display = 'flex'; 
                    }, 1000);
                }
            }, 2500);
        }

        function updateUI() {
            const elLevel = document.getElementById('ui-level');
            const elPoints = document.getElementById('ui-points');
            const elMenuTotal = document.getElementById('menu-total-points');
            const elMenuLevel = document.getElementById('menu-current-level');
            const elScore = document.getElementById('ui-score');
            const elTarget = document.getElementById('ui-target');

            if (elLevel) elLevel.innerText = state.level;
            if (elPoints) elPoints.innerText = state.totalPoints;
            if (elMenuTotal) elMenuTotal.innerText = state.totalPoints;
            if (elMenuLevel) elMenuLevel.innerText = state.level;
            if (elScore) elScore.innerText = game.score;
            if (elTarget) elTarget.innerText = game.target;

            const diffBar = document.getElementById('ui-difficulty-bar');
            if (diffBar) {
                const percentage = (state.level / 100) * 100;
                diffBar.style.width = percentage + '%';
                diffBar.style.background = percentage < 40 ? '#00ff88' : percentage < 75 ? '#ffd700' : '#ff4444';
            }
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function createStars() { game.stars = []; for(let i = 0; i < 100; i++) game.stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5+0.1 }); }

        function togglePause() {
            if (!game.active) return;
            game.paused = !game.paused;
            const pm = document.getElementById('pauseMenu');
            if (pm) pm.style.display = game.paused ? 'flex' : 'none';
            if (!game.paused) { gameLoop(); if (state.musicEnabled) startMusic(); } else stopMusic();
        }

        function showSettings() { const sm = document.getElementById('settingsMenu'); if (sm) sm.style.display = 'flex'; }
        function closeSettings() { const sm = document.getElementById('settingsMenu'); if (sm) sm.style.display = 'none'; }
        function updateSettings() {
            const mt = document.getElementById('musicToggle');
            const st = document.getElementById('soundToggle');
            if (mt) state.musicEnabled = mt.checked;
            if (st) state.soundsEnabled = st.checked;
            localStorage.setItem('music', state.musicEnabled);
            localStorage.setItem('sounds', state.soundsEnabled);
            if (!state.musicEnabled) stopMusic(); else if (game.active && !game.paused) startMusic();
        }

        function startDailyChallenge() {
            if (state.dailyUsed) return;
            state.isDaily = true; game.target = 300;
            const modeText = document.getElementById('ui-mode-text');
            if (modeText) modeText.innerHTML = "GÜNLÜK CHALLENGE";
            startGame();
        }

        function startGame() {
            if (!audioCtx) audioCtx = new AudioCtx();
            game.score = 0; game.obstacles = []; game.player = new Player(); game.active = true; game.paused = false;
            if (!state.isDaily) { 
                game.target = 100; 
                const modeText = document.getElementById('ui-mode-text');
                if (modeText) modeText.innerHTML = `Seviye: <span id="ui-level">${state.level}</span> / 100`; 
            }
            const ss = document.getElementById('startScreen');
            const gos = document.getElementById('gameOverScreen');
            const lus = document.getElementById('levelUpScreen');
            const pm = document.getElementById('pauseMenu');
            const pb = document.getElementById('pauseBtn');
            if (ss) ss.style.display = 'none'; 
            if (gos) gos.style.display = 'none';
            if (lus) lus.style.display = 'none'; 
            if (pm) pm.style.display = 'none';
            if (pb) pb.style.display = 'block';
            updateUI(); 
            stopMusic(); 
            startMusic(); 
            gameLoop();
        }

        function gameOver() {
            game.active = false; cancelAnimationFrame(game.animationId);
            const pb = document.getElementById('pauseBtn');
            if (pb) pb.style.display = 'none'; 
            playLossSound(); 
            stopMusic();
            const got = document.getElementById('game-over-title');
            const rb = document.getElementById('retryBtn');
            if (state.isDaily) { 
                state.dailyUsed = true; 
                localStorage.setItem('spaceDailyUsed', new Date().toDateString()); 
                if (got) got.innerText = "CHALLENGE BİTTİ"; 
                if (rb) rb.style.display = 'none'; 
            }
            else { 
                if (got) got.innerText = "GÖREV BAŞARISIZ"; 
                if (rb) rb.style.display = 'block'; 
            }
            const finalScoreEl = document.getElementById('final-score-text');
            if (finalScoreEl) finalScoreEl.innerText = `Skor: ${game.score} / ${game.target}`;
            const gos = document.getElementById('gameOverScreen');
            if (gos) gos.style.display = 'flex'; 
            updateDailyTimer();
        }

        function checkLevelUp() {
            if (game.score >= game.target) {
                game.active = false; cancelAnimationFrame(game.animationId); stopMusic();
                const r = rockets[state.selectedRocketIdx];
                const earned = (game.target * r.multiplier) + (state.level * 20);
                state.totalPoints += earned;
                
                const compLvlEl = document.getElementById('completed-level');
                if (compLvlEl) {
                    if (state.isDaily) { 
                        state.dailyUsed = true; 
                        localStorage.setItem('spaceDailyUsed', new Date().toDateString()); 
                        compLvlEl.innerText = "CHALLENGE"; 
                    }
                    else { 
                        compLvlEl.innerText = state.level; 
                    }
                }
                const earnedEl = document.getElementById('earned-points');
                if (earnedEl) earnedEl.innerText = earned;
                
                // Seviye 100 Kontrolü
                const nBtn = document.getElementById('nextLevelBtn');
                const fBtn = document.getElementById('finishBtn');
                if (state.level >= 100 && !state.isDaily) {
                    if(nBtn) nBtn.style.display = 'none';
                    if(fBtn) fBtn.style.display = 'block';
                } else {
                    if(nBtn) nBtn.style.display = 'block';
                    if(fBtn) fBtn.style.display = 'none';
                }

                const lus = document.getElementById('levelUpScreen');
                if (lus) lus.style.display = 'flex'; 
                saveState();
            }
        }

        function nextLevel() { if (state.isDaily) backToMenu(); else { if (state.level < 100) state.level++; startGame(); } }

        function updateDailyTimer() {
            const now = new Date(); const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1); const diff = tomorrow - now;
            const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
            const timerStr = `Sıradaki: ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            state.dailyUsed = localStorage.getItem('spaceDailyUsed') === now.toDateString();
            const btn = document.getElementById('dailyBtn'); const timerEl = document.getElementById('dailyTimer');
            if (state.dailyUsed) { if(btn) btn.disabled = true; if(btn) btn.innerText = "HAKKIN DOLDU"; if(timerEl) timerEl.innerText = timerStr; }
            else { if(btn) btn.disabled = false; if(btn) btn.innerText = "GÜNLÜK CHALLENGE"; if(timerEl) timerEl.innerText = "ŞİMDİ OYNA!"; }
        }

        class Player {
            constructor() { const r = rockets[state.selectedRocketIdx]; this.width = 50; this.height = 60; this.x = canvas.width / 2 - 25; this.y = canvas.height - 120; this.speed = r.speed; this.emoji = r.emoji; }
            draw() { ctx.font = `50px Arial`; ctx.textAlign = "center"; ctx.fillText(this.emoji, this.x + 25, this.y + 35); }
            update() { if ((game.keys['ArrowLeft'] || game.keys['KeyA'] || game.keys['leftT']) && this.x > 0) this.x -= this.speed; if ((game.keys['ArrowRight'] || game.keys['KeyD'] || game.keys['rightT']) && this.x < canvas.width - 50) this.x += this.speed; }
        }

        class Obstacle {
            constructor() { 
                const sizeMod = Math.min(20, state.level / 5); 
                this.size = (Math.random()*30 + 30) + sizeMod; 
                this.x = Math.random()*(canvas.width - this.size); this.y = -this.size; 
                const baseSpeed = 2.5 + (state.level * 0.2); 
                this.speed = Math.random()*2 + baseSpeed; 
                this.emoji = state.level < 25 ? "☄️" : state.level < 50 ? "🌑" : state.level < 75 ? "🛸" : "👾"; 
            }
            draw() { ctx.font = `${this.size}px Arial`; ctx.fillText(this.emoji, this.x + this.size/2, this.y + this.size/2); }
            update() { this.y += this.speed; }
        }

        function gameLoop() {
            if (!game.active || game.paused) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "white";
            game.stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            game.player.update(); game.player.draw();
            const spawnRate = 0.025 + (state.level * 0.003); if (Math.random() < spawnRate) game.obstacles.push(new Obstacle());
            for (let i = game.obstacles.length - 1; i >= 0; i--) { const o = game.obstacles[i]; o.update(); o.draw(); if (Math.abs(game.player.x + 25 - (o.x + o.size/2)) < (20 + o.size/4) && Math.abs(game.player.y + 30 - (o.y + o.size/2)) < (25 + o.size/4)) gameOver(); if (o.y > canvas.height) { game.obstacles.splice(i, 1); game.score++; const scEl = document.getElementById('ui-score'); if(scEl) scEl.innerText = game.score; checkLevelUp(); } }
            game.animationId = requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => { game.keys[e.code] = true; if (e.code === 'KeyP') togglePause(); if (!game.active && e.code === 'Space') { const lus = document.getElementById('levelUpScreen'); const gos = document.getElementById('gameOverScreen'); const ss = document.getElementById('startScreen'); if (lus && lus.style.display === 'flex') { if(state.level >= 100) backToMenu(); else nextLevel(); } else if (gos && gos.style.display === 'flex') startGame(); else if (ss && ss.style.display === 'flex') startGame(); } });
        window.addEventListener('keyup', e => game.keys[e.code] = false);

        function showRocketMenu() {
            const container = document.getElementById('rocket-list-container');
            if (!container) return;
            container.innerHTML = '';
            rockets.forEach((r, idx) => {
                const isUnlocked = state.unlockedRockets.includes(idx);
                const isSelected = state.selectedRocketIdx === idx;
                const card = document.createElement('div');
                card.className = `rocket-card ${isSelected ? 'selected' : ''} ${!isUnlocked ? 'locked' : ''}`;
                card.innerHTML = `
                    <span class="emoji">${r.emoji}</span>
                    <strong>${r.name}</strong><br>
                    Güç: ${r.power}<br>
                    <small>X${r.multiplier} Çarpan</small>
                    ${isUnlocked ? 
                        `<button class="action-btn select-btn" onclick="event.stopPropagation(); finalizeRocket(${idx})">${isSelected ? 'SEÇİLİ' : 'SEÇ'}</button>` : 
                        `<button class="action-btn buy-btn" onclick="event.stopPropagation(); finalizeRocket(${idx})">💰 ${r.cost} SATIN AL</button>`
                    }
                `;
                card.onclick = () => {
                    document.querySelectorAll('.rocket-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                };
                container.appendChild(card);
            });
            const rm = document.getElementById('rocketMenu');
            if (rm) rm.style.display = 'flex';
        }

        function finalizeRocket(idx) {
            const r = rockets[idx];
            const isUnlocked = state.unlockedRockets.includes(idx);
            if (isUnlocked) {
                state.selectedRocketIdx = idx;
                localStorage.setItem('spaceRocketIdx', idx);
                showRocketMenu();
            } else if (state.totalPoints >= r.cost) {
                state.totalPoints -= r.cost;
                state.unlockedRockets.push(idx);
                state.selectedRocketIdx = idx;
                saveState();
                updateUI();
                showRocketMenu();
            }

        }

        function hideRocketMenu() { const rm = document.getElementById('rocketMenu'); if (rm) rm.style.display = 'none'; }
        function saveState() { localStorage.setItem('spaceLevel', state.level); localStorage.setItem('spacePoints', state.totalPoints); localStorage.setItem('spaceUnlockedRockets', JSON.stringify(state.unlockedRockets)); }
        function backToMenu() { 
            game.active = false; game.paused = false; state.isDaily = false; 
            stopMusic(); 
            const gos = document.getElementById('gameOverScreen');
            const lus = document.getElementById('levelUpScreen');
            const pm = document.getElementById('pauseMenu');
            const ss = document.getElementById('startScreen');
            const pb = document.getElementById('pauseBtn');
            if (gos) gos.style.display = 'none'; 
            if (lus) lus.style.display = 'none'; 
            if (pm) pm.style.display = 'none'; 
            if (ss) ss.style.display = 'flex'; 
            if (pb) pb.style.display = 'none'; 
            updateUI(); 
        }
        window.onload = init;
        window.onresize = resize;
